version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognitive-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18.0-community
    container_name: cognitive-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password123
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
